<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World!</title>
    <link rel="stylesheet" href="../output.css" />
    <style>
      .content {
        position: relative;
        z-index: 20;
        opacity: 1 !important;
        max-height: none !important;
        overflow: visible;
        pointer-events: auto;
        transform: none !important;
      }

      .circle1blur {
        z-index: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="w-full h-screen bg-[#111] text-white flex justify-center items-center relative">
    <div class=" z-0"></div>
     <div class="circle1blur w-62.5 h-62.5 rounded-[450px] absolute bottom-5.5 bg-purple-600 blur-[300px] z-0"></div>
    
    <div class="content  bg-[#2c2c2c32] relative rounded-md border border-[#7c7c7c90] z-10">
      <form id="loginForm">
        <div class="w-96 p-6 shadow-lg ">
          <h1 class="text-3xl text-center font-semibold text-white typewriter">Login</h1>
          <hr class="mt-3">
          <div class="mt-3">
            <label for="username" class="block text-base mb-2 text-white">Username</label>
            <input type="text" id="username" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white" placeholder="Enter username" required>
          </div>
          <div class="mt-3">
            <label for="password" class="block text-base mb-2 text-white">Password</label>
            <input type="password" id="password" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white" placeholder="Enter password" required>
          </div>
          <div class="mt-3 flex justify-between items-center text-white">

            <div>
              <input type="checkbox" id="rememberMe">
              <label for="rememberMe">Remember me?</label>
            </div>
           
            <div>
              <a href="#" id="forgotPassword" class="text-indigo-600">Forgot password?</a>
            </div>
          </div>
          <div id="resetPanel" class="mt-3 hidden">
            <label for="resetCurrentPassword" class="block text-base mb-2 text-white">Contrasena actual</label>
            <input type="password" id="resetCurrentPassword" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white" placeholder="Escribe tu contrasena actual">
            <label for="resetNewPassword" class="block text-base mb-2 text-white mt-3">Nueva contrasena</label>
            <input type="password" id="resetNewPassword" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white" placeholder="Minimo 8 caracteres">
            <div class="mt-3 grid grid-cols-2 gap-2">
              <button type="button" id="applyResetPassword" class="border-2 border-indigo-700 text-white bg-indigo-700 py-1 rounded-md hover:bg-transparent hover:text-indigo-700 font-semibold">Actualizar</button>
              <button type="button" id="cancelResetPassword" class="border-2 border-gray-500 text-white py-1 rounded-md hover:bg-gray-700 font-semibold">Cancelar</button>
            </div>
            <hr class="mt-4 mb-3 border-[#7c7c7c90]">
            <p class="text-sm text-white/80">Si olvidaste tu contrasena, usa tu codigo de recuperacion:</p>
            <label for="recoveryCode" class="block text-base mb-2 text-white mt-3">Codigo de recuperacion</label>
            <input type="text" id="recoveryCode" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white uppercase" placeholder="Ejemplo: 3FA91C2B">
            <label for="resetNewPasswordByCode" class="block text-base mb-2 text-white mt-3">Nueva contrasena</label>
            <input type="password" id="resetNewPasswordByCode" class="border w-full text-base px-2 py-1 focus:outline-none focus:ring-0 focus:border-gray-600 text-white" placeholder="Minimo 8 caracteres">
            <div class="mt-3">
              <button type="button" id="applyResetByCode" class="border-2 border-indigo-700 text-white bg-indigo-700 py-1 w-full rounded-md hover:bg-transparent hover:text-indigo-700 font-semibold">Recuperar con codigo</button>
            </div>
          </div>
           <div>
              <input type="checkbox" id="visible">
              <label for="visible">Mostrar contraseña</label>
            </div>
          <p id="formMessage" class="mt-3 min-h-6 text-sm text-red-300"></p>
          <div id="recoveryCodeNotice" class="hidden mt-2 rounded-md border border-emerald-500/60 bg-emerald-500/10 p-3">
            <p class="text-sm text-emerald-200">Guarda este codigo. Lo necesitaras si olvidas tu contrasena.</p>
            <p id="recoveryCodeValue" class="text-lg tracking-widest font-semibold text-emerald-100 mt-1"></p>
          </div>
          <div class="mt-5">
            <button type="submit" id="submit" class="border-2 border-indigo-700 text-white bg-indigo-700 py-1 w-full rounded-md hover:bg-transparent hover:text-indigo-700 font-semibold">Login</button>
          </div> 
          <div class="mt-2">
            <button type="button" id="register" class="border-2 border-gray-500 text-white py-1 w-full rounded-md hover:bg-gray-700 font-semibold">Crear cuenta</button>
          </div>
          
        </div>
      </form>
  </div>

<script src="login.js"></script>
</body>
</html>
